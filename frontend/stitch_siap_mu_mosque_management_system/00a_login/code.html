<style>
        .mosque-pattern {
            background-color: #085041;
            background-image: linear-gradient(135deg, #085041 0%, #0f6e56 50%, #27ae60 100%);
            position: relative;
        }
        .mosque-pattern::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
            pointer-events: none;
        }
        
        .floating-input:focus + .floating-label,
        .floating-input:not(:placeholder-shown) + .floating-label {
            transform: translateY(-120%) scale(0.85);
            color: #0f6e56;
        }
        .floating-input {
            border-color: #bec9c3;
        }
        .floating-input:focus {
            border-color: #0f6e56;
            box-shadow: 0 0 0 2px rgba(15, 110, 86, 0.2);
        }
    </style>
</head>
<body class="mosque-pattern min-h-screen flex flex-col justify-center items-center p-md text-on-surface font-body-lg">
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(8,80,65,0.2)] p-xl relative z-10 border border-[#D1FAE5]">
<div class="flex flex-col items-center text-center mb-xl">
<div class="w-16 h-16 bg-[#085041] rounded-full flex items-center justify-center mb-md shadow-md">
<span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">mosque</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary mb-sm">SIAP-MU</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">Sistem Informasi Administrasi dan Pengelolaan Masjid Umat</p>
</div>
<form action="#" class="flex flex-col gap-md">
<div class="relative w-full h-14">
<input class="floating-input peer w-full h-full px-md pt-lg pb-sm border rounded-lg bg-transparent text-on-surface outline-none transition-all placeholder-transparent" id="email" placeholder="Email" type="email"/>
<label class="floating-label absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none origin-left font-body-md" for="email">Email / Username</label>
</div>
<div class="relative w-full h-14">
<input class="floating-input peer w-full h-full px-md pt-lg pb-sm pr-12 border rounded-lg bg-transparent text-on-surface outline-none transition-all placeholder-transparent" id="password" placeholder="Password" type="password"/>
<label class="floating-label absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none origin-left font-body-md" for="password">Password</label>
<button aria-label="Toggle password visibility" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-xs">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Lupa Password?</a>
</div>
<button class="w-full mt-sm py-md px-lg rounded-lg bg-gradient-to-r from-[#0F6E56] to-[#27AE60] text-white font-title-md text-title-md shadow-md hover:shadow-lg hover:brightness-110 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container" type="submit">
                Masuk
            </button>
</form>
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Belum memiliki akun? 
                <a class="font-title-md text-title-md text-primary hover:text-primary-container transition-colors" href="#">Daftar di sini</a>
</p>
</div>
</main>
<footer class="mt-xl text-center relative z-10 text-white/80 font-label-md text-label-md">
<p>© 2024 SIAP-MU - Sistem Informasi Administrasi Masjid. v1.2.0</p>
</footer>
</body></html>
